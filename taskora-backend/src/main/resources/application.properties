spring.application.name=taskora-backend
# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/taskora_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Replace 'root' with your actual MySQL Workbench username and password
spring.datasource.username=root
spring.datasource.password=Junaid@2705
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# 'update' tells Hibernate to update the schema if entities change, 
# but it will respect the tables you already created manually.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

